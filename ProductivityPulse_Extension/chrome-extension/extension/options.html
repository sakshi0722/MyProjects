<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>ProductivityPulse — Settings</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Segoe UI', Arial, sans-serif; background: #0f1117; color: #e2e8f0; padding: 32px 24px; max-width: 600px; margin: 0 auto; }
  h1 { font-size: 22px; font-weight: 800; color: #60a5fa; margin-bottom: 4px; }
  .sub { color: #64748b; font-size: 13px; margin-bottom: 28px; }

  .section { margin-bottom: 28px; }
  .section-title { font-size: 13px; color: #60a5fa; text-transform: uppercase; letter-spacing: 1px; font-weight: 700; margin-bottom: 14px; }

  .setting-row { display: flex; align-items: center; justify-content: space-between; background: #13171f; border: 1px solid #1e2a3a; border-radius: 10px; padding: 14px 16px; margin-bottom: 8px; }
  .setting-label { font-size: 14px; font-weight: 600; }
  .setting-sub { font-size: 12px; color: #64748b; margin-top: 3px; }

  input[type="number"], input[type="text"] {
    background: #1e2a3a; border: 1px solid #253347; color: #e2e8f0;
    border-radius: 8px; padding: 8px 12px; font-size: 14px; width: 100px;
  }

  .toggle { position: relative; width: 44px; height: 24px; cursor: pointer; }
  .toggle input { opacity: 0; width: 0; height: 0; }
  .toggle-slider { position: absolute; inset: 0; background: #1e2a3a; border-radius: 12px; transition: 0.3s; }
  .toggle-slider:before { content: ''; position: absolute; width: 18px; height: 18px; left: 3px; top: 3px; background: #64748b; border-radius: 50%; transition: 0.3s; }
  .toggle input:checked + .toggle-slider { background: #1d4ed8; }
  .toggle input:checked + .toggle-slider:before { transform: translateX(20px); background: #fff; }

  .tag-input { display: flex; flex-wrap: wrap; gap: 8px; background: #13171f; border: 1px solid #1e2a3a; border-radius: 10px; padding: 12px; margin-bottom: 8px; }
  .tag { background: #4c0519; color: #f87171; border-radius: 6px; padding: 4px 10px; font-size: 12px; display: flex; align-items: center; gap: 6px; }
  .tag button { background: none; border: none; color: #f87171; cursor: pointer; font-size: 14px; line-height: 1; }
  .add-tag-row { display: flex; gap: 8px; }
  .add-tag-row input { flex: 1; width: auto; }
  .btn-sm { padding: 8px 16px; background: #1d4ed8; color: #fff; border: none; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; }
  .btn-sm:hover { background: #2563eb; }

  .save-row { margin-top: 24px; }
  .btn-save { padding: 12px 32px; background: #4ade80; color: #0f1117; border: none; border-radius: 10px; font-size: 14px; font-weight: 800; cursor: pointer; }
  .btn-save:hover { background: #22c55e; }
  .saved-msg { display: none; color: #4ade80; font-size: 13px; margin-left: 12px; }
</style>
</head>
<body>
<h1>⚡ Settings</h1>
<div class="sub">Customize ProductivityPulse to fit your workflow</div>

<div class="section">
  <div class="section-title">Productivity Goals</div>
  <div class="setting-row">
    <div>
      <div class="setting-label">Daily Goal (minutes)</div>
      <div class="setting-sub">Target minutes of productive browsing per day</div>
    </div>
    <input type="number" id="dailyGoal" value="120" min="10" max="600"/>
  </div>
</div>

<div class="section">
  <div class="section-title">Focus Mode</div>
  <div class="setting-row">
    <div>
      <div class="setting-label">Enable Focus Mode</div>
      <div class="setting-sub">Blocks unproductive & custom blocked sites</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="focusMode"/>
      <span class="toggle-slider"></span>
    </label>
  </div>
  <div class="setting-row">
    <div>
      <div class="setting-label">Show Daily Notification</div>
      <div class="setting-sub">Daily summary at 9 PM</div>
    </div>
    <label class="toggle">
      <input type="checkbox" id="dailyNotif" checked/>
      <span class="toggle-slider"></span>
    </label>
  </div>
</div>

<div class="section">
  <div class="section-title">Custom Blocked Sites</div>
  <div class="tag-input" id="blockedTags"></div>
  <div class="add-tag-row">
    <input type="text" id="newSite" placeholder="e.g. twitter.com"/>
    <button class="btn-sm" id="addSiteBtn">Add</button>
  </div>
</div>

<div class="save-row">
  <button class="btn-save" id="saveBtn">Save Settings</button>
  <span class="saved-msg" id="savedMsg">✅ Saved!</span>
</div>

<script>
let blockedSites = [];

async function loadSettings() {
  const r = await chrome.storage.local.get('settings');
  const s = r.settings || {};
  document.getElementById('dailyGoal').value = s.dailyGoalMinutes || 120;
  document.getElementById('focusMode').checked = !!s.focusMode;
  document.getElementById('dailyNotif').checked = s.dailyNotif !== false;
  blockedSites = s.blockedSites || [];
  renderTags();
}

function renderTags() {
  const container = document.getElementById('blockedTags');
  container.innerHTML = '';
  if (blockedSites.length === 0) {
    container.innerHTML = '<span style="color:#374151;font-size:12px">No custom blocked sites yet</span>';
    return;
  }
  blockedSites.forEach((site, i) => {
    const tag = document.createElement('div');
    tag.className = 'tag';
    tag.innerHTML = `${site}<button onclick="removeSite(${i})">×</button>`;
    container.appendChild(tag);
  });
}

window.removeSite = function(i) {
  blockedSites.splice(i, 1);
  renderTags();
};

document.getElementById('addSiteBtn').addEventListener('click', () => {
  const val = document.getElementById('newSite').value.trim().toLowerCase();
  if (val && !blockedSites.includes(val)) {
    blockedSites.push(val);
    renderTags();
    document.getElementById('newSite').value = '';
  }
});

document.getElementById('saveBtn').addEventListener('click', async () => {
  const settings = {
    dailyGoalMinutes: parseInt(document.getElementById('dailyGoal').value) || 120,
    focusMode: document.getElementById('focusMode').checked,
    dailyNotif: document.getElementById('dailyNotif').checked,
    blockedSites
  };
  await chrome.storage.local.set({ settings });
  const msg = document.getElementById('savedMsg');
  msg.style.display = 'inline';
  setTimeout(() => msg.style.display = 'none', 2000);
});

loadSettings();
</script>
</body>
</html>
